receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }
processors:
  batch: {}
  redaction/secrets:
    allow_all_keys: true
    blocked_values:
      - "(?i)(api[_-]?key|token|secret|password)\\s*[:=]\\s*\\S+"
      - "postgres(ql)?://\\S+"
      - "sk-[A-Za-z0-9]{10,}"
  attributes/scrub:
    actions:
      - { key: tool.arguments, action: delete }
      - { key: full_command, action: delete }
      - { key: file_path, action: update, value: "[redacted-path]" }
exporters:
  sapm:
    access_token: ${SPLUNK_ACCESS_TOKEN}
    endpoint: https://ingest.${SPLUNK_REALM}.signalfx.com/v2/trace
  signalfx:
    access_token: ${SPLUNK_ACCESS_TOKEN}
    realm: ${SPLUNK_REALM}
service:
  pipelines:
    traces:  { receivers: [otlp], processors: [redaction/secrets, attributes/scrub, batch], exporters: [sapm] }
    metrics: { receivers: [otlp], processors: [batch], exporters: [signalfx] }
