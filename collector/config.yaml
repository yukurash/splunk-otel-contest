receivers:
  otlp:
    protocols:
      grpc: { endpoint: 0.0.0.0:4317 }
      http: { endpoint: 0.0.0.0:4318 }
processors:
  batch: {}
  redaction/secrets:
    allow_all_keys: true
    blocked_values:
      - "(?i)(api[_-]?key|token|secret|password)\\s*[:=]\\s*\\S+"
      - "postgres(ql)?://\\S+"
      - "sk-[A-Za-z0-9]{10,}"
  attributes/scrub:
    actions:
      - { key: tool.arguments, action: delete }
      - { key: full_command, action: delete }
      - { key: file_path, action: update, value: "[redacted-path]" }
exporters:
  # sapm は新しめの Splunk OTel Collector で廃止されたため、
  # Splunk APM への OTLP/HTTP ingest エンドポイントに送る。
  otlp_http/splunk:
    traces_endpoint: https://ingest.${SPLUNK_REALM}.signalfx.com/v2/trace/otlp
    headers:
      X-SF-Token: ${SPLUNK_ACCESS_TOKEN}
  signalfx:
    access_token: ${SPLUNK_ACCESS_TOKEN}
    realm: ${SPLUNK_REALM}
  # イベント層(claude_code.api_request 等)を手元で捕捉するための debug exporter。
  # cost_usd / prompt.id を含む LogRecord を標準出力に詳細表示する。
  debug:
    verbosity: detailed
service:
  pipelines:
    traces:  { receivers: [otlp], processors: [redaction/secrets, attributes/scrub, batch], exporters: [otlp_http/splunk] }
    metrics: { receivers: [otlp], processors: [batch], exporters: [signalfx] }
    logs:    { receivers: [otlp], processors: [redaction/secrets, attributes/scrub, batch], exporters: [debug] }
